<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Der 3+4-Bruch</title>
<style>
  :root {
    --bg: #0a0d13;
    --ink: #eef1f6;
    --ink-dim: rgba(238,241,246,.55);
    --ink-faint: rgba(238,241,246,.28);
    --gold: #f0b45e;
    --teal: #54d0c2;
    --line: rgba(238,241,246,.10);
    --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.55;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
  }
  main {
    width: 100%;
    max-width: 620px;
    padding: clamp(20px, 5vw, 48px) clamp(16px, 4vw, 32px) 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; margin-bottom: clamp(16px, 3vh, 32px); }
  header h1 {
    font-weight: 400;
    font-size: clamp(1.25rem, 4vw, 1.6rem);
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  header .sub {
    margin-top: 6px;
    font-size: .8rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .equation {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: clamp(1.05rem, 3.5vw, 1.3rem);
    letter-spacing: .12em;
    color: var(--ink-dim);
    transition: opacity .8s ease;
  }
  .equation .n3 { color: var(--gold); }
  .equation .n4 { color: var(--teal); }
  .equation .n7 { color: var(--ink); }

  figure { width: 100%; display: flex; justify-content: center; }
  svg {
    width: min(84vw, 460px);
    height: auto;
    display: block;
    overflow: visible;
  }

  /* --- reveal machinery --- */
  .rv { opacity: 0; transition: opacity 1s ease; }
  .rv.on { opacity: 1; }
  .draw {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    transition: stroke-dashoffset 1.6s ease .15s, opacity .6s ease;
  }
  .draw.on { stroke-dashoffset: 0; }
  .fade-late.on { transition-delay: .5s; }
  .rv.off-late { opacity: 0 !important; }

  /* --- text panel --- */
  .panel {
    width: 100%;
    min-height: 9.5em;
    margin-top: clamp(14px, 3vh, 26px);
    text-align: center;
    padding: 0 4px;
  }
  .step-no {
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .3em;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }
  .step-title {
    font-size: 1.08rem;
    letter-spacing: .06em;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .step-body {
    font-size: .95rem;
    color: var(--ink-dim);
    max-width: 46ch;
    margin: 0 auto;
  }
  .step-body b { color: var(--ink); font-weight: 600; }
  .step-body .g { color: var(--gold); }
  .step-body .t { color: var(--teal); }
  .step-body .m { font-family: var(--mono); font-size: .9em; }
  .panel-inner { transition: opacity .35s ease; }
  .panel-inner.swap { opacity: 0; }

  /* --- stat row (step 5) --- */
  .stats {
    display: flex;
    gap: clamp(12px, 4vw, 28px);
    justify-content: center;
    margin-top: 18px;
    opacity: 0;
    transition: opacity .9s ease .2s;
    flex-wrap: wrap;
  }
  .stats.on { opacity: 1; }
  .stat {
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: var(--mono);
    font-size: .82rem;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 13px;
  }
  .stat .chip { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .stat .v { color: var(--ink); }

  /* --- controls --- */
  nav {
    margin-top: clamp(20px, 4vh, 34px);
    display: flex;
    align-items: center;
    gap: clamp(14px, 4vw, 26px);
    user-select: none;
    -webkit-user-select: none;
  }
  nav button {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: .85rem;
    letter-spacing: .1em;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .3s, color .3s, opacity .3s;
  }
  nav button:hover:not(:disabled) { border-color: rgba(240,180,94,.5); color: var(--ink); }
  nav button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  nav button:disabled { opacity: .3; cursor: default; }
  .dots { display: flex; gap: 10px; }
  .dots button {
    width: 9px; height: 9px; padding: 0;
    border-radius: 50%;
    border: 1px solid var(--ink-faint);
    background: transparent;
  }
  .dots button[aria-current="true"] { background: var(--gold); border-color: var(--gold); }
  .hint {
    margin-top: 14px;
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  svg .mono-t { font-family: var(--mono); }

  @media (prefers-reduced-motion: reduce) {
    .rv, .draw, .stats, .panel-inner, .equation { transition: none !important; }
    .draw { stroke-dasharray: none; stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
<main data-step="1">
  <header>
    <h1>Der 3+4-Bruch</h1>
    <div class="sub">Ternär trifft Dual</div>
    <div class="equation" aria-hidden="true">
      <span class="n3">3</span> + <span class="n4">4</span> = <span class="n7">7</span>
    </div>
  </header>

  <figure aria-label="Kreis mit einbeschriebenem Dreieck und Viereck, die die obere Ecke teilen">
  <svg viewBox="0 0 500 500" role="img">
    <defs>
      <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f0b45e" stop-opacity=".16"/>
        <stop offset="1" stop-color="#54d0c2" stop-opacity=".16"/>
      </linearGradient>
      <pattern id="chaosDots" width="11" height="11" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="rgba(238,241,246,.22)"/>
      </pattern>
      <radialGradient id="originGlow">
        <stop offset="0" stop-color="#f0b45e" stop-opacity=".55"/>
        <stop offset="1" stop-color="#f0b45e" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Step 5: Chaos = Kreis minus Struktur (evenodd) -->
    <path id="chaosFill" class="rv" fill-rule="evenodd" stroke="none"
      d="M 250 60 A 190 190 0 1 0 250.01 60 Z
         M 250 60 L 440 250 L 389.09 300.91 L 414.55 345 L 345 345 L 250 440
           L 155 345 L 85.45 345 L 110.91 300.91 L 60 250 Z"
      fill="rgba(110,124,158,.14)"/>
    <path class="rv" data-for="chaosFill2" id="chaosTex" fill-rule="evenodd" stroke="none"
      d="M 250 60 A 190 190 0 1 0 250.01 60 Z
         M 250 60 L 440 250 L 389.09 300.91 L 414.55 345 L 345 345 L 250 440
           L 155 345 L 85.45 345 L 110.91 300.91 L 60 250 Z"
      fill="url(#chaosDots)" opacity=".5"/>

    <!-- Step 5: Struktur = Dreieck ∪ Viereck -->
    <polygon id="unionFill" class="rv"
      points="250,60 440,250 389.09,300.91 414.55,345 345,345 250,440 155,345 85.45,345 110.91,300.91 60,250"
      fill="rgba(240,180,94,.12)" stroke="none"/>

    <!-- Step 4: geteilter Kern (Dreieck ∩ Viereck) -->
    <polygon id="coreFill" class="rv"
      points="250,60 389.09,300.91 345,345 155,345 110.91,300.91"
      fill="url(#coreGrad)" stroke="rgba(238,241,246,.22)" stroke-width="1"/>

    <!-- Step 1: der Kreis, die Einheit -->
    <circle id="circleO" class="rv draw" cx="250" cy="250" r="190" pathLength="1"
      fill="none" stroke="rgba(238,241,246,.42)" stroke-width="1.4"/>

    <!-- Step 2: Dreieck (3, ternär) -->
    <polygon id="triangle" class="rv draw" points="250,60 85.45,345 414.55,345" pathLength="1"
      fill="none" stroke="#f0b45e" stroke-width="2" stroke-linejoin="round"/>
    <g id="triMarks" class="rv fade-late">
      <circle cx="85.45" cy="345" r="4" fill="#f0b45e"/>
      <circle cx="414.55" cy="345" r="4" fill="#f0b45e"/>
      <text x="63" y="378" class="mono-t" font-size="17" fill="#f0b45e">3</text>
    </g>

    <!-- Step 3: Viereck (4, dual) -->
    <polygon id="square" class="rv draw" points="250,60 440,250 250,440 60,250" pathLength="1"
      fill="none" stroke="#54d0c2" stroke-width="2" stroke-linejoin="round"/>
    <g id="sqMarks" class="rv fade-late">
      <circle cx="60" cy="250" r="4" fill="#54d0c2"/>
      <circle cx="440" cy="250" r="4" fill="#54d0c2"/>
      <circle cx="250" cy="440" r="4" fill="#54d0c2"/>
      <text x="455" y="238" class="mono-t" font-size="17" fill="#54d0c2">4</text>
    </g>

    <!-- Step 1: gemeinsamer Ursprung oben -->
    <g id="origin" class="rv">
      <circle cx="250" cy="60" r="26" fill="url(#originGlow)"/>
      <circle cx="250" cy="60" r="5" fill="#f0b45e" stroke="#0a0d13" stroke-width="2"/>
      <text x="250" y="26" text-anchor="middle" font-family="Georgia, serif"
        font-size="14" letter-spacing="2" fill="rgba(238,241,246,.6)">URSPRUNG</text>
    </g>

    <!-- Step 4: die vier Pole -->
    <g id="poles" class="rv">
      <g stroke="rgba(238,241,246,.5)" stroke-width="1" fill="#eef1f6">
        <circle cx="110.91" cy="300.91" r="4.5" stroke="none"/>
        <circle cx="110.91" cy="300.91" r="9" fill="none"/>
        <circle cx="155" cy="345" r="4.5" stroke="none"/>
        <circle cx="155" cy="345" r="9" fill="none"/>
        <circle cx="345" cy="345" r="4.5" stroke="none"/>
        <circle cx="345" cy="345" r="9" fill="none"/>
        <circle cx="389.09" cy="300.91" r="4.5" stroke="none"/>
        <circle cx="389.09" cy="300.91" r="9" fill="none"/>
      </g>
      <text x="250" y="322" text-anchor="middle" class="mono-t"
        font-size="13" fill="rgba(238,241,246,.75)" id="coreLabel">∩ ≈ 38,6 %</text>
    </g>

    <!-- Step 5: Flächen-Labels -->
    <g id="areaLabels" class="rv">
      <text x="250" y="230" text-anchor="middle" class="mono-t"
        font-size="17" fill="#f0b45e">66 %</text>
      <text x="168" y="404" text-anchor="middle" class="mono-t"
        font-size="14" fill="rgba(238,241,246,.7)">34 %</text>
    </g>
  </svg>
  </figure>

  <div class="stats" id="stats" aria-hidden="true">
    <div class="stat"><span class="chip" style="background:rgba(240,180,94,.85)"></span>
      Struktur <span class="v">≈ 66 %</span></div>
    <div class="stat"><span class="chip" style="background:rgba(110,124,158,.9)"></span>
      Chaos <span class="v">≈ 34 %</span></div>
    <div class="stat"><span class="chip" style="background:linear-gradient(180deg,#f0b45e,#54d0c2)"></span>
      Kern <span class="v">≈ 38,6 %</span></div>
  </div>

  <section class="panel" aria-live="polite">
    <div class="panel-inner" id="panelInner">
      <div class="step-no" id="stepNo"></div>
      <div class="step-title" id="stepTitle"></div>
      <p class="step-body" id="stepBody"></p>
    </div>
  </section>

  <nav aria-label="Schritte">
    <button id="btnPrev" type="button">‹ Zurück</button>
    <div class="dots" id="dots" role="tablist"></div>
    <button id="btnNext" type="button">Weiter ›</button>
  </nav>
  <div class="hint">Pfeiltasten · Wischen · Klick</div>
</main>

<script>
(function () {
  "use strict";

  var STEPS = [
    {
      no: "I / V",
      title: "Die Einheit",
      body: 'Der Kreis: das Ganze, ungeteilt. Oben liegt der <b>gemeinsame Ursprung</b> — der eine Punkt, von dem jede Teilung ausgeht.'
    },
    {
      no: "II / V",
      title: "Die 3 — ternär",
      body: 'Das <span class="g">Dreieck</span> teilt den Kreis in Drittel, ab dem Ursprung: <span class="m">90° · 210° · 330°</span>. Die erste ungerade Ordnung — das Ternäre.'
    },
    {
      no: "III / V",
      title: "Die 4 — dual",
      body: 'Das <span class="t">Viereck</span> viertelt den Kreis, aus demselben Ursprung: <span class="m">90° · 180° · 270° · 0°</span>. Das Duale. <b>Bis 6 hält Symmetrie; die 7&nbsp;=&nbsp;3+4 bricht sie.</b>'
    },
    {
      no: "IV / V",
      title: "Der geteilte Kern",
      body: 'Dreieck und Viereck überlappen sich zu <span class="m">≈ 38,6 %</span> des Kreises — der gemeinsame Kern. An <b>vier Polen</b> kreuzen sich ihre Kanten: dort reibt Ternär an Dual.'
    },
    {
      no: "V / V",
      title: "Struktur und Chaos",
      body: 'Zusammen füllen 3 und 4 <span class="m">≈ 66 %</span> des Kreises — Struktur. <span class="m">≈ 34 %</span> bleiben frei — Chaos. Die 7 ist <b>nicht der Ursprung</b>, sie ist der Verbindungspunkt: <span class="g">3</span>&nbsp;+&nbsp;<span class="t">4</span>&nbsp;=&nbsp;<b>7</b>, der erste erzwungene asymmetrische Bruch.'
    }
  ];

  // element id -> step from which it is visible (1-based)
  var REVEAL = {
    circleO: 1, origin: 1,
    triangle: 2, triMarks: 2,
    square: 3, sqMarks: 3,
    coreFill: 4, poles: 4,
    chaosFill: 5, chaosTex: 5, unionFill: 5, areaLabels: 5
  };
  // elements hidden again from a later step
  var HIDE_FROM = { coreFill: 5, coreLabel: 5 };

  var step = 1;
  var TOTAL = STEPS.length;
  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var panelInner = document.getElementById("panelInner");
  var stepNo = document.getElementById("stepNo");
  var stepTitle = document.getElementById("stepTitle");
  var stepBody = document.getElementById("stepBody");
  var btnPrev = document.getElementById("btnPrev");
  var btnNext = document.getElementById("btnNext");
  var dotsBox = document.getElementById("dots");
  var stats = document.getElementById("stats");
  var mainEl = document.querySelector("main");

  var dots = [];
  for (var i = 1; i <= TOTAL; i++) {
    (function (n) {
      var d = document.createElement("button");
      d.type = "button";
      d.setAttribute("aria-label", "Schritt " + n);
      d.addEventListener("click", function () { go(n); });
      dotsBox.appendChild(d);
      dots.push(d);
    })(i);
  }

  function setText() {
    var s = STEPS[step - 1];
    stepNo.textContent = s.no;
    stepTitle.textContent = s.title;
    stepBody.innerHTML = s.body;
  }

  function render() {
    mainEl.setAttribute("data-step", String(step));
    Object.keys(REVEAL).forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      var on = step >= REVEAL[id];
      if (HIDE_FROM[id] && step >= HIDE_FROM[id]) on = false;
      el.classList.toggle("on", on);
    });
    var coreLabel = document.getElementById("coreLabel");
    coreLabel.style.opacity = (step === 4) ? "1" : "0";
    coreLabel.style.transition = reduced ? "none" : "opacity .8s ease";
    stats.classList.toggle("on", step === TOTAL);
    stats.setAttribute("aria-hidden", step === TOTAL ? "false" : "true");
    btnPrev.disabled = step === 1;
    btnNext.disabled = step === TOTAL;
    dots.forEach(function (d, idx) {
      d.setAttribute("aria-current", idx + 1 === step ? "true" : "false");
    });
  }

  function go(n) {
    if (n < 1 || n > TOTAL || n === step) return;
    step = n;
    if (reduced) {
      setText();
      render();
      return;
    }
    panelInner.classList.add("swap");
    window.setTimeout(function () {
      setText();
      panelInner.classList.remove("swap");
    }, 360);
    render();
  }

  btnPrev.addEventListener("click", function () { go(step - 1); });
  btnNext.addEventListener("click", function () { go(step + 1); });

  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight" || e.key === "ArrowDown") { go(step + 1); }
    else if (e.key === "ArrowLeft" || e.key === "ArrowUp") { go(step - 1); }
  });

  var touchX = null;
  document.addEventListener("touchstart", function (e) {
    if (e.touches.length === 1) touchX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener("touchend", function (e) {
    if (touchX === null) return;
    var dx = e.changedTouches[0].clientX - touchX;
    touchX = null;
    if (Math.abs(dx) < 45) return;
    go(dx < 0 ? step + 1 : step - 1);
  }, { passive: true });

  setText();
  // initial paint on next frame so transitions run
  if (reduced) {
    render();
  } else {
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(render);
    });
  }
})();
</script>
</body>
</html>
